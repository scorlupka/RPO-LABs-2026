basePath: /api/v1
definitions:
  handlers.AuthorizeTransactionRequest:
    properties:
      amount:
        type: integer
      card_number:
        type: string
      terminal_serial_number:
        type: string
    type: object
  handlers.AuthorizeTransactionResponse:
