      is_blocked:
        type: boolean
      key_id:
        type: integer
      number:
        type: string
      owner_name:
        type: string
    type: object
  handlers.CreateKeyRequest:
    properties:
      key_value:
        type: string
    type: object
  handlers.CreateTerminalRequest:
    properties:
      address:
        type: string
      name:
        type: string
      serial_number:
        type: string
      status:
        type: boolean
    type: object
  handlers.CreateTransactionRequest:
    properties:
      amount:
        type: integer
      card_id:
        type: integer
      terminal_id:
        type: integer
    type: object
  handlers.CreateUserRequest:
    properties:
      is_admin:
        type: boolean
      login:
        type: string
      password:
        type: string
    type: object
  handlers.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  handlers.LoginResponse:
    properties:
      token:
        type: string
    type: object
  handlers.UpdateCardRequest:
    properties:
      balance:
        type: integer
      expire_date:
        type: string
      is_blocked:
        type: boolean
      key_id:
        type: integer
      number:
        type: string
      owner_name:
        type: string
    type: object
  handlers.UpdateKeyRequest:
    properties:
      key_value:
        type: string
    type: object
  handlers.UpdateTerminalRequest:
    properties:
      address:
        type: string
      name:
        type: string
      serial_number:
        type: string
      status:
        type: boolean
    type: object
  handlers.UpdateTransactionRequest:
    properties:
      amount:
        type: integer
      card_id:
        type: integer
      terminal_id:
        type: integer
    type: object
  handlers.UpdateUserRequest:
    properties:
      is_admin:
        type: boolean
      login:
        type: string
      password:
        type: string
    type: object
  handlers.UserResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      login:
        type: string
    type: object
  models.Card:
    properties:
      balance:
        format: int64
        type: integer
      createdAt:
        type: string
      expireDate:
        type: string
      id:
        format: int64
        type: integer
      isBlocked:
        type: boolean
      keyID:
        format: int64
        type: integer
      number:
        type: string
      ownerName:
        type: string
    type: object
  models.Key:
    properties:
      createdAt:
        type: string
      id:
        format: int64
        type: integer
      keyValue:
        type: string
    type: object
  models.Terminal:
    properties:
      address:
        type: string
      createdAt:
        type: string
      id:
        format: int64
        type: integer
      name:
        type: string
      serialNumber:
        type: string
      status:
        type: boolean
    type: object
  models.Transaction:
    properties:
      amount:
        format: int64
        type: integer
      cardID:
        format: int64
        type: integer
      createdAt:
        type: string
      id:
        format: int64
        type: integer
      terminalID:
        format: int64
        type: integer
    type: object
